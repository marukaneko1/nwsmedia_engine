<style>
  :root {
    --bg: #0f1117;

    --surface2: #232736;
    --border: #2e3348;
    --text: #e4e6f0;
    --text-muted: #8b8fa3;
    --accent: #6c63ff;
    --accent-glow: rgba(108, 99, 255, .15);
    --green: #22c55e;
    --green-bg: rgba(34, 197, 94, .1);
    --amber: #f59e0b;
    --amber-bg: rgba(245, 158, 11, .1);
    --red: #ef4444;
    --red-bg: rgba(239, 68, 68, .1);
    --cyan: #06b6d4;
    --cyan-bg: rgba(6, 182, 212, .1);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); line-height:1.6; }

  .container { max-width: 1100px; margin: 0 auto; padding: 32px 24px; }

  header { text-align: center; margin-bottom: 40px; }
  header h1 { font-size: 28px; font-weight: 700; margin-bottom: 6px; }
  header p { color: var(--text-muted); font-size: 14px; }

  .progress-bar-container { background: var(--surface); border-radius: 12px; padding: 20px 24px; margin-bottom: 32px; border: 1px solid var(--border); }
  .progress-stats { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .progress-stats .label { font-size: 14px; color: var(--text-muted); }
  .progress-stats .value { font-size: 20px; font-weight: 700; color: var(--accent); }
  .progress-track { height: 10px; background: var(--surface2); border-radius: 5px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), #a78bfa); border-radius: 5px; transition: width .4s ease; }

  .filter-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; }
  .filter-btn { padding: 6px 14px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); color: var(--text-muted); font-size: 13px; cursor: pointer; transition: all .2s; }
  .filter-btn:hover { border-color: var(--accent); color: var(--text); }
  .filter-btn.active { background: var(--accent-glow); border-color: var(--accent); color: var(--accent); font-weight: 600; }

  .section { margin-bottom: 28px; }
  .section-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; cursor: pointer; user-select: none; }
  .section-header h2 { font-size: 16px; font-weight: 600; }
  .section-header .badge { font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: 600; }
  .badge-critical { background: var(--red-bg); color: var(--red); }
  .badge-high { background: var(--amber-bg); color: var(--amber); }
  .badge-medium { background: var(--cyan-bg); color: var(--cyan); }
  .badge-low { background: var(--green-bg); color: var(--green); }
  .section-header .chevron { color: var(--text-muted); transition: transform .2s; font-size: 12px; }
  .section-header .chevron.open { transform: rotate(90deg); }
  .section-header .count { color: var(--text-muted); font-size: 13px; margin-left: auto; }

  .section-body { display: grid; gap: 6px; }
  .section-body.collapsed { display: none; }

  .task { display: flex; align-items: flex-start; gap: 10px; padding: 10px 14px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; transition: all .2s; }
  .task:hover { border-color: var(--accent); background: var(--surface2); }
  .task.done { opacity: .5; }
  .task input[type=checkbox] { appearance: none; width: 18px; height: 18px; border-radius: 4px; border: 2px solid var(--border); cursor: pointer; flex-shrink: 0; margin-top: 2px; transition: all .15s; }
  .task input[type=checkbox]:checked { background: var(--green); border-color: var(--green); }
  .task input[type=checkbox]:checked::after { content: '✓'; display: block; text-align: center; color: #fff; font-size: 12px; line-height: 14px; font-weight: 700; }
  .task-content { flex: 1; }
  .task-title { font-size: 14px; font-weight: 500; }
  .task.done .task-title { text-decoration: line-through; color: var(--text-muted); }
  .task-desc { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .task-tags { display: flex; gap: 4px; margin-top: 4px; flex-wrap: wrap; }
  .tag { font-size: 10px; padding: 1px 6px; border-radius: 4px; background: var(--surface2); color: var(--text-muted); border: 1px solid var(--border); }
  .tag-be { border-color: #6366f180; color: #818cf8; }
  .tag-fe { border-color: #06b6d480; color: #22d3ee; }
  .tag-infra { border-color: #f59e0b80; color: #fbbf24; }
  .tag-sdk { border-color: #a78bfa80; color: #c4b5fd; }

  .legend { display: flex; gap: 16px; justify-content: center; margin-top: 32px; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-muted); }
  .legend-dot { width: 10px; height: 10px; border-radius: 3px; }
</style>
</head>

</div>

let completedSet = new Set();
const STORAGE_KEY = 'nws_crm_checklist';

function loadState() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) completedSet = new Set(JSON.parse(saved));
  } catch {}
}

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify([...completedSet]));
}

function taskId(si, ti) { return `s${si}_t${ti}`; }

function countAll() {
  let total = 0;
  DATA.forEach(s => total += s.tasks.length);
  return total;
}

function updateProgress() {
  const total = countAll();
  const done = completedSet.size;
  const pct = total ? Math.round((done / total) * 100) : 0;
  document.getElementById('progressValue').textContent = `${done} / ${total} tasks (${pct}%)`;
  document.getElementById('progressFill').style.width = pct + '%';
}

let activeFilter = 'all';
let openSections = new Set(DATA.map((_, i) => i));

function render() {
  const container = document.getElementById('checklist');
  container.innerHTML = '';

  DATA.forEach((section, si) => {
    if (activeFilter !== 'all' && section.priority !== activeFilter) return;

    const sectionDiv = document.createElement('div');
    sectionDiv.className = 'section';

    const isOpen = openSections.has(si);
    const doneCount = section.tasks.filter((_, ti) => completedSet.has(taskId(si, ti))).length;

    sectionDiv.innerHTML = `
      <div class="section-header" data-si="${si}">
        <span class="chevron ${isOpen ? 'open' : ''}">&#9654;</span>
        <h2>${section.title}</h2>
        <span class="badge badge-${section.priority}">${section.priority}</span>
        <span class="count">${doneCount}/${section.tasks.length}</span>
      </div>
      <div class="section-body ${isOpen ? '' : 'collapsed'}">
        ${section.tasks.map((task, ti) => {
          const id = taskId(si, ti);
          const checked = completedSet.has(id);
          return `
            <div class="task ${checked ? 'done' : ''}">
              <input type="checkbox" ${checked ? 'checked' : ''} data-id="${id}">
              <div class="task-content">
                <div class="task-title">${task.t}</div>
                <div class="task-desc">${task.d}</div>
                <div class="task-tags">${task.tags.map(tg => `<span class="tag tag-${tg}">${tg}</span>`).join('')}</div>
              </div>
            </div>`;
        }).join('')}
      </div>`;

    container.appendChild(sectionDiv);
  });

  container.querySelectorAll('.section-header').forEach(h => {
    h.addEventListener('click', () => {
      const si = parseInt(h.dataset.si);
      if (openSections.has(si)) openSections.delete(si); else openSections.add(si);
      render();
    });
  });

  container.querySelectorAll('input[type=checkbox]').forEach(cb => {
    cb.addEventListener('change', () => {
      const id = cb.dataset.id;
      if (cb.checked) completedSet.add(id); else completedSet.delete(id);
      saveState();
      updateProgress();
      render();
    });
  });
}

document.getElementById('filterBar').addEventListener('click', e => {
  if (!e.target.classList.contains('filter-btn')) return;
  activeFilter = e.target.dataset.filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  e.target.classList.add('active');
  render();
});

loadState();
render();
updateProgress();
</script>
