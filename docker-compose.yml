services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: nwsmedia
      POSTGRES_PASSWORD: nwsmedia
      POSTGRES_DB: nwsmedia_leads
    ports:
      - "5433:5432"
    volumes:
      - ./docker-data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nwsmedia -d nwsmedia_leads"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - ./docker-data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
